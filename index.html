<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
       
        <section class="allElems">
           <div class="todo elems" id="0"><img src="https://images.unsplash.com/photo-1648457257285-cfbc3781cc54?q=80&w=1035&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""><h2>To-do List</h2></div>
           <div class="daily elems" id="1"><img src="https://images.unsplash.com/photo-1718202248232-0cdbc15d29b2?q=80&w=1064&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""><h2>Daily Planner</h2></div>
           <div class="mot elems" id="2"> <img src="https://images.unsplash.com/photo-1678986718987-76f0b9357e0f?q=80&w=987&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""><h2>Motivation</h2></div>
           <div class="pomo elems" id="3"><img src=https://images.unsplash.com/photo-1677249490921-3246e81f19e3?q=80&w=1035&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""><h2>Pomodoro Goals</h2> </div>
           <div class="goals elems" id="4"><img src="https://images.unsplash.com/photo-1634848860108-6d8368f5a0b3?q=80&w=1064&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""><h2>Daily Goals </h2></div>
        </section>
        <section class="fullElem to-do-list-fullPage">
            <button class="back"   id="0">Close</button>
            <h1>Your Personalised Task List</h1>

            <div class="todo-container">
                <div class="addTask"> 
                    <form>
                        <h3>Add task</h3>
                        <input type="text" id="taskinput"placeholder="Enter Task" required>
                        <textarea placeholder="Enter Details" name="" id="" cols="30" rows="10" required></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" name="checkbox" id="check">
                            <label for="check">Mark as Important</label>
                        </div>
                        <button>Add task</button>

                    </form>
                </div>
                <div class="allTask">
                    
                </div>
            </div>
        </section>
        <section class="fullElem daily-planner-fullPage"><button class="back"  id="1">Close</button>
            
            <h1>Plan your day to be more productive</h1>
            <div class="day-planner">
                
              
                  
            </div>
        </section>
        <section class="fullElem motivational-fullPage">
           <button class="back" id="2">Close</button> <h1>Motivational Quote</h1>
        </section>
        <section class="fullElem pomodoro-fullPage">
            <button class="back"  id="3">Close</button><h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem daily-goals-fullPage">
            <button class="back"  id="4">Close</button><h1>Daily Goals</h1>
        </section>
    </div>
   <script src="script.js"></script> 
</body>
</html>
